{% if include.images %}
{% assign cols = include.columns | default: 2 %}
<div class="gallery-grid gallery-grid-cols-{{ cols }} mb-5">
  {% for img in include.images %}
  <div class="gallery-grid-item">
    <img src="{{ img.src | relative_url }}" alt="{{ img.caption | default: '' }}" class="img-fluid rounded w-100">
    {% if img.caption %}
    <p class="gallery-caption">{{ img.caption }}</p>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
