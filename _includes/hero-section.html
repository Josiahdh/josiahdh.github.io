<!-- hero area -->
<section class="hero-area bg-dark">
  <div class="container">
    <div class="row">
      <div class="col-lg-11 mx-auto">
        <h1 class="text-white font-tertiary hero-title" id="hero-title">{{ site.data.settings.hero.hero-title }}</h1>
        {% if site.data.settings.hero.hero-subtitle %}
        <p class="text-white hero-subtitle" id="hero-subtitle">{{ site.data.settings.hero.hero-subtitle }}</p>
        {% endif %}
      </div>
    </div>
  </div>
  <div class="layer-bg w-100" id="slideshow">
    {% for image in site.data.settings.hero.slideshow-images %}
      <img class="img-fluid w-100 slideshow-image{% unless forloop.first %} inactive{% else %} active{% endunless %}" src="{{ site.baseurl }}/{{ image.image }}" data-text-theme="{{ image.text | default: 'light' }}" alt="">
    {% endfor %}
  </div>
  <script>
    (function() {
      const slideshow = document.getElementById('slideshow');
      if (!slideshow) return;

      const slides = Array.from(slideshow.querySelectorAll('.slideshow-image'));
      if (slides.length < 2) return;

      let currentIndex = 0;

      setInterval(() => {
        slides[currentIndex].classList.remove('active');
        slides[currentIndex].classList.add('inactive');

        currentIndex = (currentIndex + 1) % slides.length;

        slides[currentIndex].classList.remove('inactive');
        slides[currentIndex].classList.add('active');
      }, 5000);
    })();
  </script>
</section>
<!-- /hero area -->
