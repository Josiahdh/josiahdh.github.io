baseurl: "" # the subpath of your site, e.g. /blog
url: "https://josiahdh.github.io" # the base hostname & protocol for your site, e.g. https://example.com
adobe_pdf_client_id: "" # production key from Adobe PDF Embed API (acrobatservices.adobe.com)

collections:
  portfolio:
    output: true
    permalink: /:name/

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
compress_html:
  clippings: all
  comments: all
  startings: [html, head, body]

# Pages Path
defaults:
  - scope:
      path: "_pages"
    values:
      permalink: /:basename:output_ext

include:
  - _pages

sass:
  sass_dir: assets/scss
  style: compressed

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE.text
  - README.md
  - SECURITY.md
